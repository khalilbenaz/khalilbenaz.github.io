<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Khalil Benazzouz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #16161f;
            --surface: #1a1a24;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99,102,241,0.15);
        }

        [data-theme="light"] {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --bg-card-hover: #f8f8fc;
            --surface: #f0f0f5;
            --border: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --text: #111118;
            --text-secondary: #555568;
            --text-muted: #9999aa;
            --accent: #4f46e5;
            --accent-light: #6366f1;
            --accent-glow: rgba(79,70,229,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }
        .theme-toggle:hover { border-color: var(--accent); transform: scale(1.05); }

        /* Nav */
        .nav {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px 0;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--accent); }

        /* Header */
        .blog-header {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 24px 32px;
        }

        .blog-title {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .blog-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Posts */
        .posts {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            padding: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .post-date {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .post-source {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(10,102,194,0.15);
            color: #5b9bd5;
        }

        .post-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
            letter-spacing: -0.3px;
        }

        .post-excerpt {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 14px;
        }

        .post-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--accent-glow);
            color: var(--accent-light);
            font-family: 'JetBrains Mono', monospace;
        }

        .post-read {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-light);
        }

        /* Pagination */
        .pagination {
            max-width: 800px;
            margin: 0 auto;
            padding: 8px 24px 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover:not(.active):not(:disabled) {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .page-info {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            padding: 0 8px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Fade in */
        .fade-in {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 640px) {
            .post-card { padding: 20px; }
            .post-title { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle"><span id="themeIcon">&#9790;</span></div>

    <nav class="nav">
        <a href="index.html" class="nav-back">&larr; Retour au CV</a>
    </nav>

    <header class="blog-header">
        <h1 class="blog-title">Blog</h1>
        <p class="blog-subtitle">Articles, reflexions et retours d'experience</p>
    </header>

    <div class="posts" id="posts"></div>
    <div class="pagination" id="pagination"></div>

    <script>
        // Theme
        const toggle = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        let theme = localStorage.getItem('theme') || (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark');

        function applyTheme(t) {
            theme = t;
            if (t === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                icon.innerHTML = '&#9728;';
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.innerHTML = '&#9790;';
            }
            localStorage.setItem('theme', t);
        }
        applyTheme(theme);
        toggle.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

        // Pagination
        const POSTS_PER_PAGE = 10;
        let allPosts = [];
        let currentPage = 1;

        async function loadPosts() {
            const container = document.getElementById('posts');
            try {
                const res = await fetch('posts.json?t=' + Date.now());
                allPosts = await res.json();

                if (!allPosts.length) {
                    container.innerHTML = `
                        <div class="empty-state fade-in visible">
                            <div class="empty-icon">&#9997;</div>
                            <p class="empty-text">Aucun article pour le moment</p>
                            <p class="empty-sub">Les prochains articles apparaitront ici</p>
                        </div>`;
                    return;
                }

                // Sort by order (LinkedIn chronology: 0 = most recent) then by date as fallback
                allPosts.sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || new Date(b.date) - new Date(a.date));

                // Read page from URL hash
                const hash = parseInt(location.hash.replace('#page', ''));
                if (hash > 0) currentPage = hash;

                renderPage(currentPage);
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p class="empty-text">Erreur de chargement</p>
                    </div>`;
            }
        }

        function renderPage(page) {
            const container = document.getElementById('posts');
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            currentPage = Math.max(1, Math.min(page, totalPages));

            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);

            container.innerHTML = pagePosts.map((post, i) => `
                <a href="${post.url}" target="_blank" class="post-card fade-in" style="transition-delay: ${i * 0.04}s">
                    <div class="post-date">
                        ${formatDate(post.date)}
                        <span class="post-source">LinkedIn</span>
                    </div>
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    ${post.excerpt ? `<p class="post-excerpt">${escapeHtml(post.excerpt)}</p>` : ''}
                    ${post.tags && post.tags.length ? `
                        <div class="post-tags">
                            ${post.tags.map(t => `<span class="post-tag">${escapeHtml(t)}</span>`).join('')}
                        </div>` : ''}
                    <span class="post-read">Lire sur LinkedIn &rarr;</span>
                </a>
            `).join('');

            renderPagination(totalPages);

            // Animate
            requestAnimationFrame(() => {
                document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
            });

            // Scroll to top smoothly
            if (page !== currentPage || history.state) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Update URL hash
            history.replaceState(null, '', page === 1 ? 'blog.html' : `#page${currentPage}`);
        }

        function renderPagination(totalPages) {
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }

            let html = '';

            // Prev
            html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&larr;</button>`;

            // Page numbers
            const range = getPageRange(currentPage, totalPages);
            if (range[0] > 1) {
                html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
                if (range[0] > 2) html += `<span class="page-info">...</span>`;
            }
            for (const p of range) {
                html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
            }
            if (range[range.length - 1] < totalPages) {
                if (range[range.length - 1] < totalPages - 1) html += `<span class="page-info">...</span>`;
                html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
            }

            // Next
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&rarr;</button>`;

            pag.innerHTML = html;
        }

        function getPageRange(current, total) {
            const delta = 2;
            let start = Math.max(1, current - delta);
            let end = Math.min(total, current + delta);
            if (current - delta < 1) end = Math.min(total, end + (1 - (current - delta)));
            if (current + delta > total) start = Math.max(1, start - (current + delta - total));
            const range = [];
            for (let i = start; i <= end; i++) range.push(i);
            return range;
        }

        function goPage(p) {
            renderPage(p);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadPosts();
    </script>
</body>
</html>
